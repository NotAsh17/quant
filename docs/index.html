<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0c0b" />
<title>CAT Quant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="#/" class="brand" data-action="goto-dashboard">
      <span class="brand-mark">Q</span>
      <div class="brand-name">CAT Quant</div>
    </a>

    <nav class="nav-tabs" role="tablist">
      <button class="nav-tab" data-view="dashboard">Practice</button>
      <button class="nav-tab" data-view="bookmarks">Bookmarks</button>
      <button class="nav-tab" data-view="analytics">Analytics</button>
    </nav>

    <div class="spacer"></div>

    <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<main id="app">
  <div class="loading-screen">
    <div class="loading-pulse"></div>
    <p>Loading question bank…</p>
  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
